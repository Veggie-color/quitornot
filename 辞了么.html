          <div className="ovl-card ranks-card" onClick={(e) => e.stopPropagation()}>
            <div className="ovl-head">
              <h3>全部段位</h3>
              <button className="ovl-x" onClick={() => setShowRanks(false)}>✕</button>
            </div>
            <div className="rank-list">
              {RANKS.map((r, i) => ({ r, i })).reverse().map(({ r, i }) => {
                const cur = r.title === rank.cur.title;
                const reached = totalVents >= r.min;
                return (
                  <div className={"rank-item" + (cur ? " cur" : "") + (reached ? " got" : "")} key={r.title}>
                    <div className="ri-medal"><RankIcon tier={i} /></div>
                    <div className="ri-body">
                      <div className="ri-title">{r.title}{cur && <i className="ri-now">当前</i>}</div>
                      <div className="ri-desc">{r.desc}</div>
                    </div>
                    <div className="ri-min">{r.min === 0 ? "起始" : r.min + "+"}</div>
                  </div>
                );
              })}
            </div>
            <div className="ovl-foot">辞意值 = 累计发泄点击次数 · 越愤越高</div>
          </div>
        </div>
      )}

      {share && (
        <div className="ovl" onClick={() => share !== "gen" && setShare(null)}>
          <div className="ovl-card share-card" onClick={(e) => e.stopPropagation()}>
            <div className="ovl-head">
              <h3>专属辞职战报</h3>
              {share !== "gen" && <button className="ovl-x" onClick={() => setShare(null)}>✕</button>}
            </div>
            {share === "gen"
              ? <div className="share-gen">正在生成你的辞职战报…</div>
              : <React.Fragment>
                  <img className="share-img" src={share.url} alt="辞职战报" />
                  <a className="rc-btn rc-btn-solid share-dl" href={share.url} download={"辞职战报_" + quitDate + ".png"}>保存图片</a>
                  <div className="ovl-foot">长按图片也可保存 / 转发</div>
                </React.Fragment>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── 起爆器外壳装饰（铆钉/推杆/端子/做旧） ─────────────────────────────────
function DetChrome({ detonate, press, phase, pct, onPlunger }) {
  const armed = phase === "armed" || phase === "open" || phase === "boom";
  const ready = phase === "open";
  const gaugePct = Math.min(100, Math.max(0, pct || 0));
  const needle = -90 + gaugePct * 1.8;
  return (
    <div className="det-chrome" aria-hidden="true">
      <div className="det-crown">
        <i className="crown-bar"></i>
        <div className="crown-gauge">
          <i className="cg-needle" style={{ transform: `translateX(-50%) rotate(${needle}deg)` }}></i>
          <i className="cg-cap"></i>
        </div>
        <i className="pl-housing"></i>
        <button
          type="button"
          className={"det-plunger" + (detonate ? " det-fire" : "") + (press ? " det-press" : "") + (ready ? " det-ready" : "")}
          onPointerDown={(e) => { e.preventDefault(); onPlunger && onPlunger(); }}
          aria-label="推杆引爆">
          <i className="pl-flash"></i>
          <i className="pl-shaft"></i>
          <i className="pl-spring"></i>
          <i className="pl-knob"></i>
          <i className="pl-spark s1"></i>
          <i className="pl-spark s2"></i>
          <i className="pl-spark s3"></i>
        </button>
        <div className={"armed-lamp" + (armed ? " on" : "")}>
          <i className="lamp-dot"></i>
          <span className="lamp-txt">ARMED</span>
        </div>
      </div>
      <div className="rail l"></div>
      <div className="rail r"></div>
      <div className="det-foot">
        <i className="term l"></i>
        <div className="maker-plate">
          <div className="mp-line1">辞了么 · 起爆台</div>
          <div className="mp-line2">No.8860 · 离职专用 · 职场拆迁</div>
        </div>
        <i className="term r"></i>
      </div>
      <div className="det-scorch"></div>
      <div className="det-scratch"></div>
      <div className="det-grain"></div>
      <div className="det-vign"></div>
    </div>
  );
}

// ── 主应用 ────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = THEMES[t.theme] || THEMES.nuke;

  const [phase, setPhase] = useState("charge"); // charge | armed | open | boom
  const [patience, setPatience] = useState(0);
  const [vent, setVent] = useState(0);
  const [result, setResult] = useState(null);
  const [toast, setToast] = useState("");

  const storeRef = useRef(loadStore());
  const [view, setView] = useState(storeRef.current.reallyQuit ? "archive" : "play");
  const [remaining, setRemaining] = useState(remainingToday(storeRef.current));
  const [confirmQuit, setConfirmQuit] = useState(false);
  const [archiveStats, setArchiveStats] = useState(null);
  const [detonate, setDetonate] = useState(false);
  const [plungerPress, setPlungerPress] = useState(false);
  const [supabaseClient] = useState(() => getSupabaseClient());
  const [authUser, setAuthUser] = useState(null);
  const [authOpen, setAuthOpen] = useState(false);
  const [authPrompt, setAuthPrompt] = useState(false);
  const [username, setUsername] = useState(() => getSavedUsername());

  const stageRef = useRef(null);
  const fallRef = useRef(null);
  const canvasRef = useRef(null);
  const fire = useConfetti(canvasRef);

  const comboRef = useRef(0);
  const maxComboRef = useRef(0);
  const lastClickRef = useRef(0);
  const lastShakeRef = useRef(0);
  const lastExtraFlyRef = useRef(0);
  const flyFrameRef = useRef(0);
  const flyQueueRef = useRef([]);
  const cfgRef = useRef({});
  cfgRef.current = { theme, t };

  useEffect(() => {
    if (!supabaseClient) return;
    let alive = true;
    const finishLogin = (user) => {
      if (!user) return;
      const name = getSavedUsername() || defaultUsername(user);
      setUsername(name);
      storeRef.current.username = name;
      saveUsername(name);
      saveStore(storeRef.current);
      syncSessionToSupabase(supabaseClient, storeRef.current, user, { markLogin: true });
    };
    const initAuth = async () => {
      const url = new URL(location.href);
      const code = url.searchParams.get("code");
      const hasAuthHash = location.hash.includes("access_token") || location.hash.includes("refresh_token");
      if (code) {
        try { await supabaseClient.auth.exchangeCodeForSession(code); } catch (e) {}
        cleanAuthUrl();
      } else if (hasAuthHash) {
        setTimeout(cleanAuthUrl, 250);
      }
      const { data } = await supabaseClient.auth.getSession();
      if (!alive) return;
      const user = data.session ? data.session.user : null;
      setAuthUser(user);
      finishLogin(user);
    };
    initAuth();
    const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, session) => {
      const user = session ? session.user : null;
      setAuthUser(user);
      if (user) {
        finishLogin(user);
        setAuthOpen(false);
        setAuthPrompt(false);
      }
    });
    return () => {
      alive = false;
      sub.subscription.unsubscribe();
    };
  }, [supabaseClient]);

  useEffect(() => {
    if (!result || authUser) return;
    let seen = false;
    try { seen = localStorage.getItem(LOGIN_PROMPT_KEY) === "1"; } catch (e) {}
    if (seen) return;
    try { localStorage.setItem(LOGIN_PROMPT_KEY, "1"); } catch (e) {}
    const id = setTimeout(() => {
      setAuthPrompt(true);
      setAuthOpen(true);
    }, 950);
    return () => clearTimeout(id);
  }, [result, authUser]);

  const buildStats = () => {
    const s = storeRef.current;
    const totalVents = s.totalVents || 0, totalBooms = s.totalBooms || 0, bestCombo = s.bestCombo || 0;
    const streak = computeStreak(s);
    const daysCount = s.days ? Object.keys(s.days).filter((k) => s.days[k].plays > 0).length : 0;
    const r = rankFor(totalVents);
    const base = r.cur.min, top = r.next ? r.next.min : Math.max(totalVents, r.cur.min + 1);
    const pctv = r.next ? Math.min(100, Math.round((totalVents - base) / (top - base) * 100)) : 100;
    const d = new Date(), y = d.getFullYear(), m = d.getMonth();
    const firstWd = (new Date(y, m, 1).getDay() + 6) % 7;
    const dim = new Date(y, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstWd; i++) cells.push(null);
    for (let day = 1; day <= dim; day++) {
      const k = y + "-" + String(m + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
      const dd = s.days && s.days[k];
      cells.push({ day, plays: dd ? dd.plays : 0, idx: dd ? dd.maxIndex : 0 });
    }
    const boardName = storeRef.current.username || username || "你";
    const board = [...FAKE_BOARD, { name: boardName, v: totalVents, me: true }]
      .sort((a, b) => b.v - a.v).map((x, i) => ({ ...x, rank: i + 1 }));
    return { totalVents, totalBooms, bestCombo, streak, daysCount, quitDate: fmtDate(s.quitDate),
      cal: { label: (m + 1) + "月", cells }, board, rank: { cur: r.cur, next: r.next, pct: pctv } };
  };

  useEffect(() => { Sfx.setEnabled(t.sound); }, [t.sound]);

  const max = t.chargeClicks;
  const pct = Math.min(100, Math.round((patience / max) * 100));

  const shake = useCallback((cls) => {
    if (!cfgRef.current.t.shake) return;
    const el = stageRef.current; if (!el) return;
    el.classList.remove("shake-sm", "shake-md", "shake-hd", "shake-lg");
    requestAnimationFrame(() => el.classList.add(cls));
  }, []);

  const phraseList = useCallback(() => {
    const extra = (cfgRef.current.t.customRage || "").trim();
    return extra ? [...RAGE_PHRASES, extra, extra] : RAGE_PHRASES;
  }, []);

  const spawnFalling = useCallback(() => {
    const layer = fallRef.current; if (!layer) return;
    while (layer.childElementCount > 19) layer.removeChild(layer.firstChild);
    const { accentList } = cfgRef.current.theme;
    const list = phraseList();
    const el = document.createElement("span");
    el.className = "fly";
    el.textContent = list[(Math.random() * list.length) | 0];
    const combo = Math.min(comboRef.current, 12);
    const size = 18 + Math.random() * 12 + combo * 0.65;
    el.style.setProperty("--x", (8 + Math.random() * 84).toFixed(1) + "%");
    el.style.fontSize = size.toFixed(0) + "px";
    el.style.color = accentList[(Math.random() * accentList.length) | 0];
    el.style.setProperty("--dx", (Math.random() * 96 - 48).toFixed(0) + "px");
    el.style.setProperty("--r0", (Math.random() * 26 - 13).toFixed(0) + "deg");
    el.style.setProperty("--r1", (Math.random() * 46 - 23).toFixed(0) + "deg");
    el.style.animationDuration = (2.35 + Math.random() * 0.95).toFixed(2) + "s";
    el.addEventListener("animationend", () => el.remove());
    flyQueueRef.current.push(el);
    if (!flyFrameRef.current) {
      flyFrameRef.current = requestAnimationFrame(() => {
        flyFrameRef.current = 0;
        const target = fallRef.current;
        if (!target) { flyQueueRef.current = []; return; }
        const frag = document.createDocumentFragment();
        flyQueueRef.current.splice(0, 4).forEach((node) => frag.appendChild(node));
        target.appendChild(frag);
      });
    }
  }, [phraseList]);

  const handleVent = useCallback(() => {
    Sfx.resume();
    const now = performance.now();
    const gap = now - lastClickRef.current;
    comboRef.current = gap < 520 ? comboRef.current + 1 : 1;
    if (comboRef.current > maxComboRef.current) maxComboRef.current = comboRef.current;
    lastClickRef.current = now;
    Sfx.vent(comboRef.current);
    spawnFalling();
    if (comboRef.current > 8 && now - lastExtraFlyRef.current > 160 && Math.random() < 0.18) {
      lastExtraFlyRef.current = now;
      spawnFalling();
    }
    // 屏幕保持恒定微震，不随 combo 升级
    if (now - lastShakeRef.current > 120) {
      lastShakeRef.current = now;
      shake("shake-sm");
    }
    if (cfgRef.current.t.shake && navigator.vibrate) {
      navigator.vibrate(12);
    }
    setVent((v) => v + 1);
    setPatience((p) => {
      const np = Math.min(max, p + 1);
      if (np >= max) {
        setPhase((ph) => {
          if (ph === "charge") { Sfx.ready(); shake("shake-lg"); }
          return ph === "charge" ? "armed" : ph;
        });
      }
      return np;
    });
  }, [max, spawnFalling, shake]);

  const handleCover = useCallback(() => {
    Sfx.cover();
    setPhase("open");
  }, []);

  const handleLockedTry = useCallback(() => {
    shake("shake-sm");
    setToast("愤怒值不够,继续狂点右边 ››");
    setTimeout(() => setToast(""), 1400);
  }, [shake]);

  const launch = useCallback(() => {
    if (remainingToday(storeRef.current) <= 0) {
      setToast("今日辞额已用完,分享解锁 +3");
      setTimeout(() => setToast(""), 1600);
      setPhase("armed");
      return;
    }
    setPhase("boom");
    setDetonate(true);
    setTimeout(() => setDetonate(false), 820);
    Sfx.boom();
    shake("shake-lg");
    const colors = [...cfgRef.current.theme.accentList, "#ffffff", "#ffd54a"];
    fire(cfgRef.current.t.confetti, colors);
    setTimeout(() => fire(Math.round(cfgRef.current.t.confetti * 0.6), colors), 280);
    setTimeout(() => Sfx.celebrate(), 220);
    setTimeout(() => {
      const today = new Date();
      const idx = 88 + ((Math.random() * 13) | 0);
      const s = storeRef.current;
      const day = ensureDay(s, todayKey());
      day.plays += 1;
      day.maxIndex = Math.max(day.maxIndex, idx);
      day.vents += vent;
      s.totalVents = (s.totalVents || 0) + vent;
      s.totalBooms = (s.totalBooms || 0) + 1;
      s.bestCombo = Math.max(s.bestCombo || 0, maxComboRef.current);
      if (!s.firstDate) s.firstDate = todayKey();
      saveStore(s);
      syncSessionToSupabase(supabaseClient, s, authUser);
      setRemaining(remainingToday(s));
      setResult({
        index: idx,
        vent,
        slogan: SLOGANS[(Math.random() * SLOGANS.length) | 0],
        yi: pickN(YI, 3),
        ji: pickN(JI, 3),
        date: `${today.getMonth() + 1}月${today.getDate()}日`,
      });
    }, 720);
  }, [authUser, fire, shake, supabaseClient, vent]);

  // 推杆交互：准备就绪时下压推杆 = 引爆；否则机械按压反馈 + 提示
  const handlePlunger = useCallback(() => {
    Sfx.resume();
    if (phase === "open") { launch(); return; }      // 盖已开 → 推杆直接引爆
    setPlungerPress(true);
    setTimeout(() => setPlungerPress(false), 280);
    Sfx.cover();
    shake("shake-sm");
    setToast(phase === "charge" ? "先狂点右边充满愤怒值" : "先掀开左侧保护盖再推");
    setTimeout(() => setToast(""), 1400);
  }, [phase, launch, shake]);

  const replay = useCallback(() => {
    setResult(null);
    setPhase("charge");
    setPatience(0);
    setVent(0);
    comboRef.current = 0;
    maxComboRef.current = 0;
    if (fallRef.current) fallRef.current.innerHTML = "";
  }, []);

  const doShare = useCallback(async () => {
    const idx = result ? result.index : 99;
    const booms = storeRef.current.totalBooms || 0;
    const txt = `辞职模拟器 ${idx}%｜我在「辞了么」完成了一次精神离职演习,核弹都按了 ${booms} 次。来测测你的辞意值 →`;
    let aborted = false;
    try {
      if (navigator.share) { await navigator.share({ title: "辞了么 · 辞职模拟器", text: txt, url: location.href }); }
      else if (navigator.clipboard) { await navigator.clipboard.writeText(txt + " " + location.href); }
    } catch (e) {
      if (e && e.name === "AbortError") aborted = true;
    }
    if (aborted) return; // 用户主动取消了分享面板 → 不发放
    const s = storeRef.current; const day = ensureDay(s, todayKey());
    day.bonus = (day.bonus || 0) + SHARE_BONUS; saveStore(s);
    setRemaining(remainingToday(s));
    setToast("已解锁 +3 次发泄机会,继续辞!");
    setTimeout(() => setToast(""), 1800);
    if (result) replay();
  }, [result, replay]);

  const askReallyQuit = useCallback(() => setConfirmQuit(true), []);
  const saveProfileName = useCallback(async (name) => {
    const rawName = String(name || "").trim();
    const error = validateUsername(rawName);
    if (error) throw new Error(error);
    const safeName = sanitizeUsername(rawName);
    setUsername(safeName);
    saveUsername(safeName);
    storeRef.current.username = safeName;
    saveStore(storeRef.current);
    await syncSessionToSupabase(supabaseClient, storeRef.current, authUser);
  }, [authUser, supabaseClient]);

  const confirmReallyQuit = useCallback(() => {
    const s = storeRef.current;
    s.reallyQuit = true; s.quitDate = todayKey();
    ensureDay(s, todayKey()); saveStore(s);
    syncSessionToSupabase(supabaseClient, s, authUser);
    setConfirmQuit(false); setResult(null);
    setArchiveStats(buildStats());
    setView("archive");
  }, [authUser, supabaseClient]);

  const resetAll = useCallback(() => {
    try { localStorage.removeItem(SKEY); } catch (e) {}
    try { localStorage.removeItem(USERNAME_KEY); } catch (e) {}
    storeRef.current = {};
    setUsername("");
    setView("play"); setResult(null); setConfirmQuit(false);
    setRemaining(remainingToday({}));
    setPhase("charge"); setPatience(0); setVent(0);
    comboRef.current = 0; maxComboRef.current = 0;
    if (fallRef.current) fallRef.current.innerHTML = "";
  }, []);

  useEffect(() => {
    if (view === "archive") {
      setArchiveStats((prev) => prev || buildStats());
      const colors = [...cfgRef.current.theme.accentList, "#ffffff", "#ffd54a"];
      setTimeout(() => { fire(Math.round(cfgRef.current.t.confetti * 1.1), colors); Sfx.celebrate(); }, 120);
      setTimeout(() => fire(Math.round(cfgRef.current.t.confetti * 0.7), colors), 480);
    }
  }, [view, fire]);

  const themeVars = {
    "--bg": theme.bg, "--bg-far": theme.bgFar, "--surface": theme.surface,
    "--surface-line": theme.surfaceLine, "--text": theme.text, "--sub": theme.sub,
    "--danger": theme.danger, "--danger-deep": theme.dangerDeep, "--warn": theme.warn,
    "--display-font": theme.displayFont, "--body-font": theme.bodyFont,
    "--mono-font": theme.monoFont, "--title-spacing": theme.titleSpacing,
  };

  const dayRec = (storeRef.current.days && storeRef.current.days[todayKey()]) || {};
  const cap = BASE_PLAYS + (dayRec.bonus || 0);
  const played = Math.min(cap, dayRec.plays || 0);
  const isAlert = view === "play" && (phase === "armed" || phase === "open");

  return (
    <div
      className={"stage" + (isAlert ? " alert" : "")}
      data-theme={t.theme}
      ref={stageRef}
      style={themeVars}>
      {view === "play" && !authOpen && !confirmQuit && (
        <AuthButton user={authUser} onClick={() => { setAuthPrompt(false); setAuthOpen(true); }} />
      )}
      {view === "play" ? (
      <div className="phone">
        <DetChrome detonate={detonate} press={plungerPress} phase={phase} pct={pct} onPlunger={handlePlunger} />
        <header className="head">
          <div className="kicker">离 · 职 · 模 · 拟 · 器</div>
          <h1 className="brand">辞了么</h1>
          <p className="tag">上班受的气,在这儿一次还清</p>
          <div className="quota">
            <span>今日辞额</span>
            <span className="quota-dots">
              {[0, 1, 2].map((i) =>
                <i key={i} className={"quota-dot" + (i < Math.min(played, 3) ? " used" : "")} />)}
            </span>
            {cap > BASE_PLAYS && <span className="quota-bonus">+{cap - BASE_PLAYS}</span>}
            <span>剩 <b>{Math.max(0, remaining)}</b> 次</span>
          </div>
        </header>

        <div className="gauge">
          <div className="gauge-top">
            <span className="gauge-label">愤怒值 · ANGER</span>
            <span className="gauge-pct">{pct}%</span>
          </div>
          <div className="gauge-track">
            <div className="gauge-fill" style={{ width: pct + "%" }}></div>
          </div>
          <div className={"gauge-hint" + (phase !== "charge" ? " ready" : "")}>
            {phase === "charge"
              ? "狂点右键发泄,充满即可解锁核弹"
              : phase === "armed"
                ? "核弹已解锁 — 掀开左侧保护盖"
                : phase === "open"
                  ? "保护盖已开 — 按下「辞了」引爆"
                  : "已引爆 · 自由万岁"}
          </div>
        </div>

        <div className="arena">
          <div className="fall-layer" ref={fallRef}></div>
          {phase === "charge" && patience === 0 && (
            <div className="arena-empty">
              <span className="arena-empty-big">受够了?</span>
              <span className="arena-empty-sm">
                <span>使</span>
                <span>劲</span>
                <span>点</span>
                <span className="arena-arrow">↓</span>
              </span>
            </div>
          )}
          {toast && <div className="toast">{toast}</div>}
        </div>

        <div className="controls">
          <div className="ctrl">
            <div className="ctrl-mount mount-nuke">
              <NukeButton phase={phase} onCover={handleCover} onFire={launch} onLockedTry={handleLockedTry} />
            </div>
            <div className="ctrl-label">辞 了</div>
          </div>
          <div className="ctrl">
            <div className={"ctrl-mount mount-vent" + (phase === "charge" ? " invite" : "")}>
              <VentButton onVent={handleVent} dim={phase === "open" || phase === "boom"} />
            </div>
            <div className="ctrl-label">狂 点 发 泄</div>
          </div>
        </div>
      </div>
      ) : (
        <div className="phone phone-archive">
          <DetChrome phase="armed" pct={100} />
          {archiveStats && <Archive stats={archiveStats} onReset={resetAll} />}
        </div>
      )}

      <canvas className="confetti" ref={canvasRef}></canvas>

      {result && <ResultCard data={result} remaining={remaining}
        onReplay={replay} onShare={doShare} onReallyQuit={askReallyQuit} />}

      {view === "play" && remaining <= 0 && !result && (
        <LockGate onShare={doShare} onReallyQuit={askReallyQuit} />
      )}

      {confirmQuit && <ConfirmDialog onCancel={() => setConfirmQuit(false)} onConfirm={confirmReallyQuit} />}

      {authOpen && (
        <LoginModal
          client={supabaseClient}
          user={authUser}
          prompt={authPrompt}
          username={username}
          onUsernameSave={saveProfileName}
          onClose={() => { setAuthOpen(false); setAuthPrompt(false); }}
          onLoggedOut={() => setAuthUser(null)}
        />
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="主题皮肤" />
        <TweakSelect label="风格" value={t.theme} options={THEME_OPTIONS}
          onChange={(v) => setTweak("theme", v)} />
        <TweakSection label="玩法手感" />
        <TweakSlider label="充能所需点击" value={t.chargeClicks} min={8} max={60} unit=" 击"
          onChange={(v) => setTweak("chargeClicks", v)} />
        <TweakSlider label="撒花密度" value={t.confetti} min={50} max={320}
          onChange={(v) => setTweak("confetti", v)} />
        <TweakToggle label="屏幕震动" value={t.shake} onChange={(v) => setTweak("shake", v)} />
        <TweakToggle label="音效" value={t.sound} onChange={(v) => setTweak("sound", v)} />
        <TweakSection label="加点私货" />
        <TweakText label="自定义发泄词" value={t.customRage} placeholder="加一句你最想喊的"
          onChange={(v) => setTweak("customRage", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
